baseURL = "https://EsnBl0ckdev.github.io/"
languageCode = "zh-cn"
title = "Bl0ckdev Blog"
theme = "cactus"
copyright = "Bl0ckdev"
disableKinds = ["taxonomy", "taxonomyTerm"]

[[menu.main]]
name = "首页"
url = "/"
weight = 1

[[menu.main]]
name = "帖子"
url = "/posts"
weight = 1

[[menu.main]]
name = "关于"
url = "/about"
weight = 2

[markup]
  [markup.tableOfContents]
    endLevel = 3
    ordered = false
    startLevel = 1
  [markup.highlight]
    codeFences = true
    guessSyntax = false
    lineNoStart = 1
    lineNos = true
    lineNumbersInTable = false
    noClasses = true
    style = "monokai"
    tabWidth = 4
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[params]
  colortheme = "dark"
  rss = true
  showAllPostsArchive = false
  mainSection = "posts"
  showAllPostsOnHomePage = true
  postsOnHomePage = 5
  showProjectsList = false
  projectsUrl = "https://github.com/EsnBl0ckdev"

 dateFormat = "2006年1月2日"

[[params.social]]
  name = "github"
  link = "https://github.com/EsnBl0ckdev"

[[params.social]]
  name = "email"
  link = "你的真实邮箱@example.com"

[[params.social]]
  name = "twitter"
  link = "https://twitter.com/你的用户名"